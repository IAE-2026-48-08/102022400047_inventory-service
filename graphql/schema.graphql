type Inventory {
    id: ID!
    nama_barang: String!
    stok: Int!
    status_qc: String
    kondisi_barang: String
    created_at: String
    updated_at: String
}

type QCResponse {
    status: String!
    message: String!
    order_id: Int!
    qc_status: String!
    notes: String
}

type Query {
    # Gunakan nama "inventories" dan "inventory" agar standar
    inventories: [Inventory!]! @all(model: "App\\Models\\Inventory")
    inventory(id: ID! @eq): Inventory @find(model: "App\\Models\\Inventory")
}

type Mutation {
    storeQC(order_id: Int!, qc_status: String!, notes: String): QCResponse!
}